<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DMZ Sentry Tactical Map</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="map-panel">
        <div class="topbar">
          <div>
            <h1>DMZ SENTRY</h1>
            <p>Tactical patrol map</p>
          </div>
          <div id="connectionBadge" class="badge offline">ROSBRIDGE OFFLINE</div>
        </div>
        <canvas id="mapCanvas" width="980" height="760" aria-label="DMZ tactical map"></canvas>
      </section>

      <aside class="side-panel">
        <section class="block">
          <h2>Mission</h2>
          <div class="button-row">
            <button id="launchBtn">출격</button>
            <button id="homeBtn" class="secondary">홈</button>
            <button id="stopBtn" class="secondary">정지</button>
            <button id="resumeBtn" class="secondary">재개</button>
          </div>
        </section>

        <section class="block">
          <h2>Status</h2>
          <dl class="status-grid">
            <dt>Mode</dt>
            <dd id="modeText">IDLE</dd>
            <dt>Position</dt>
            <dd id="positionText">x 0.00 / y 0.00</dd>
            <dt>Yaw</dt>
            <dd id="yawText">0.0 deg</dd>
            <dt>Patrol WP</dt>
            <dd id="waypointText">none</dd>
          </dl>
        </section>

        <section class="block">
          <h2>Inspection Camera</h2>
          <div class="ptz-grid" aria-label="Inspection camera pan tilt controls">
            <span></span>
            <button id="tiltUpBtn" class="secondary">Tilt Up</button>
            <span></span>
            <button id="panLeftBtn" class="secondary">Pan Left</button>
            <button id="centerCameraBtn">Center</button>
            <button id="panRightBtn" class="secondary">Pan Right</button>
            <span></span>
            <button id="tiltDownBtn" class="secondary">Tilt Down</button>
            <span></span>
          </div>
          <div class="button-row">
            <button id="zoomInBtn">Zoom +</button>
            <button id="zoomOutBtn" class="secondary">Zoom -</button>
            <button id="zoomResetBtn" class="secondary">Reset</button>
            <button id="clearTargetBtn" class="secondary">Clear</button>
          </div>
          <p class="hint">지도 위 unidentified target을 클릭하면 관측 카메라가 해당 위치를 봅니다.</p>
        </section>

        <section class="block alert-block" id="alertBlock">
          <h2>Alert</h2>
          <div id="alertText" class="alert-text">No active alert</div>
        </section>

        <section class="block">
          <h2>Event Log</h2>
          <ol id="eventLog" class="event-log"></ol>
        </section>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
